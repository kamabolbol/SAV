server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_promtail_scrape']
        regex: 'true'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_promtail_service']
        target_label: 'service'
    pipeline_stages:
      # 1. Décapsuler le wrapper Docker
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # 2. Parser le JSON interne (votre application)
      - json:
          expressions:
            level: level
            request_id: request_id
            trace_id: trace_id
            status: status
            message: message
            # Ajoutez ici les champs spécifiques à votre appli (ex: user_id, endpoint, model_name)
          source: log
      # 3. Horodatage à partir du champ time de Docker
      - timestamp:
          source: time
          format: RFC3339Nano
      # 4. Ajouter les champs les plus utiles comme labels pour faciliter les recherches
      - labels:
          level: level
          request_id: request_id
          trace_id: trace_id
          status: status