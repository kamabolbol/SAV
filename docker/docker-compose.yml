services:
  db:
    image: postgres:15
    container_name: erp_postgres
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: erp_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G

  odoo:
    image: odoo:18.0
    container_name: erp_odoo
    depends_on:
      - db
      - ollama
    ports:
      - "8070:8069"
    volumes:
      - ../odoo/addons:/mnt/extra-addons
      - ../odoo/config:/etc/odoo
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  ai-gateway:
    build: ../ai_gateway
    container_name: erp_ai_gateway
    ports:
      - "8000:8000"
    volumes:
      - ../ai_gateway:/app
      - ../data/chroma:/app/chroma_db
      - ../ai_gateway/logs:/app/logs
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DB_HOST=db
      - DB_USER=odoo
      - DB_PASSWORD=odoo
      - CHROMA_PATH=/app/chroma_db
      - AI_MODEL=phi3:mini
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================================
  # OBSERVABILITY SERVICES
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: erp_prometheus
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:3.0.0
    container_name: erp_loki
    volumes:
      - ../loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:3.0.0
    container_name: erp_promtail
    volumes:
      - ../promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yaml
    ports:
      - "9080:9080"
    networks:
      - erp-network
    restart: unless-stopped
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M

  tempo:
    image: grafana/tempo:2.4.1
    container_name: erp_tempo
    command: -config.file=/etc/tempo/tempo-config.yaml
    volumes:
      - ../tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.0.0
    container_name: erp_grafana
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      - erp-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  ollama_data:
  chroma_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  erp-network:
    driver: bridge